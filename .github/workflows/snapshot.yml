name: Snapshot

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish snapshot to mineCodes (snapshots)
        run: ./gradlew :publish --no-daemon --stacktrace
        env:
          MINECODES_USERNAME: ${{ secrets.MINECODES_USERNAME }}
          MINECODES_PASSWORD: ${{ secrets.MINECODES_PASSWORD }}
