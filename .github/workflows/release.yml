name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Next development version bump'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute versions
        id: ver
        run: |
          current="$(grep -E '^version=' gradle.properties | head -1 | cut -d= -f2 | tr -d '[:space:]')"
          case "$current" in
            *-SNAPSHOT) ;;
            *) echo "::error::gradle.properties version '$current' is not a -SNAPSHOT"; exit 1 ;;
          esac
          release="${current%-SNAPSHOT}"
          major="$(echo "$release" | cut -d. -f1)"
          minor="$(echo "$release" | cut -d. -f2)"
          patch="$(echo "$release" | cut -d. -f3)"
          case "${{ inputs.bump }}" in
            major) next="$((major + 1)).0.0-SNAPSHOT" ;;
            minor) next="${major}.$((minor + 1)).0-SNAPSHOT" ;;
            *)     next="${major}.${minor}.$((patch + 1))-SNAPSHOT" ;;
          esac
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $release, next development version $next"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish release to mineCodes (releases)
        run: ./gradlew :publish -PreleaseVersion=${{ steps.ver.outputs.release }} --no-daemon --stacktrace
        env:
          MINECODES_USERNAME: ${{ secrets.MINECODES_USERNAME }}
          MINECODES_PASSWORD: ${{ secrets.MINECODES_PASSWORD }}

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.release }}
          target_commitish: ${{ github.sha }}
          name: v${{ steps.ver.outputs.release }}
          generate_release_notes: true
          files: build/libs/*.jar

      - name: Bump to next development version
        run: |
          sed -i -E "s/^version=.*/version=${{ steps.ver.outputs.next }}/" gradle.properties

      - name: Publish next snapshot to mineCodes (snapshots)
        run: ./gradlew :publish --no-daemon --stacktrace
        env:
          MINECODES_USERNAME: ${{ secrets.MINECODES_USERNAME }}
          MINECODES_PASSWORD: ${{ secrets.MINECODES_PASSWORD }}

      - name: Commit next development version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: prepare next development version ${{ steps.ver.outputs.next }}"
          git push origin HEAD:${{ github.ref_name }}
