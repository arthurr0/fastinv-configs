title: "<gradient:#ff5555:#55ff55>Przykladowy sklep</gradient>"
rows: 6
contentSlots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34, 37, 38, 39, 40, 41, 42, 43]
pattern:
  - "#########"
  - "#.......#"
  - "#.......#"
  - "#.......#"
  - "#.......#"
  - "P#######N"
items:
  '#':
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  'P':
    material: ARROW
    name: "<yellow>Poprzednia strona"
    actions: ["[page] prev"]
  'N':
    material: ARROW
    name: "<yellow>Nastepna strona"
    actions: ["[page] next"]
  diament:
    material: DIAMOND
    name: "<aqua>Diament <gray>(klik mnie)"
    lore:
      - "<gray>Akcje z configu + handler z kodu"
    slots: [4]
    glow: true
    actions:
      - "[sound] ENTITY_EXPERIENCE_ORB_PICKUP"
      - "[broadcast] <gold>Ktos kliknal diament w przykladowym menu!"
